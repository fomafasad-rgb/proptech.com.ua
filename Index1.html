<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlanka Control</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; position: relative; }
        .location { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #38bdf8; }
        .status-ok { color: #4ade80; }
        .status-critical { color: #f87171; font-weight: bold; }
        .time { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
        .btn-refresh { background: #38bdf8; color: #0f172a; padding: 12px 30px; margin-top: 30px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SmartPlanka Dashboard</h1>
    <div class="grid" id="sensorGrid"></div>
    <button class="btn-refresh" onclick="fetchData()">Оновити дані</button>

    <script>
        // Твій новий домен бекенду
        const apiUrl = "https://monitor.proptech.com.ua";

        async function fetchData() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.msg === "No data") {
                    document.getElementById('sensorGrid').innerHTML = "<div>Очікуємо перші дані від датчиків...</div>";
                    return;
                }
                
                renderSensors(data);
            } catch (error) {
                console.error("Помилка завантаження:", error);
                document.getElementById('sensorGrid').innerHTML = "<div style='color: #f87171'>Помилка зв'язку з сервером</div>";
            }
        }

        function renderSensors(data) {
            const grid = document.getElementById('sensorGrid');
            grid.innerHTML = '';
            
            // Якщо прийде масив датчиків — пройдемо циклом, якщо один — зробимо масивом
            const sensors = Array.isArray(data) ? data : [data];
            
            sensors.forEach(s => {
                const moisture = s.moisture || 0;
                const battery = s.battery || 0;
                const location = s.location || "Датчик №1";
                const updated = s.updated ? new Date(s.updated).toLocaleString('uk-UA') : "Щойно";
                
                const statusText = moisture > 40 ? "CRITICAL: ВОЛОГА" : "НОРМА";
                const statusClass = moisture > 40 ? "status-critical" : "status-ok";

                grid.innerHTML += `
                    <div class="card">
                        <div class="location">${location}</div>
                        <div>Вологість: ${moisture}%</div>
                        <div>Заряд: ${battery}%</div>
                        <div class="${statusClass}">Статус: ${statusText}</div>
                        <div class="time">Оновлено: ${updated}</div>
                    </div>
                `;
            });
        }

        // Автооновлення кожні 30 секунд
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
