<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBud.Digital — PropTech Gold Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #050505; }
    
    /* ЗОЛОТИЙ ГРАДІЄНТ ТА НЕОН */
    .gold-text {
      background: linear-gradient(to bottom, #FFD700 0%, #D4AF37 50%, #B8860B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
    }
    .gold-border { border-color: rgba(212, 175, 55, 0.3); }
    .gold-bg { background: linear-gradient(135deg, #D4AF37, #B8860B); }
    
    .hero-bg { 
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
      url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80') center/cover; 
    }

    .card-hover { transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.05); }
    .card-hover:hover { 
      transform: translateY(-5px); 
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.2);
    }
    
    /* Адаптивність для Hero */
    @media (max-width: 768px) {
      .hero-title { font-size: 2.5rem !important; }
      .hero-sub { font-size: 1.1rem !important; }
    }
  </style>
</head>
<body class="text-white">

  <section class="hero-bg min-h-[70vh] flex items-center justify-center relative px-6 py-20">
    <div class="max-w-5xl mx-auto text-center">
      <h1 class="hero-title text-6xl md:text-8xl font-bold gold-text mb-6 uppercase tracking-tighter">
        GBUD
      </h1>
      <p class="hero-sub text-2xl md:text-3xl font-light tracking-[0.2em] text-zinc-400 mb-10 uppercase">
        PropTech <span class="text-white">Monitoring</span>
      </p>
      <div class="inline-flex items-center gap-4 bg-zinc-900/50 border gold-border px-8 py-4 rounded-full backdrop-blur-md">
        <div class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></div>
        <span class="text-sm md:text-base font-bold tracking-widest text-zinc-200">SYSTEM ONLINE • REAL-TIME FEED</span>
      </div>
    </div>
  </section>

  <section class="py-16 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <h2 class="text-3xl font-bold">Активні датчики</h2>
        <div class="flex gap-4">
            <div id="status-tag" class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-xs text-zinc-500 uppercase">
                Очікування даних...
            </div>
        </div>
      </div>
      
      <div id="sensor-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        </div>
    </div>
  </section>

  <script>
    async function updateSensors() {
      try {
        const response = await fetch('https://monitor.proptech.com.ua/?token=monitor-2026');
        let data = await response.json();
        
        // КЛЮЧОВЕ ВИПРАВЛЕННЯ: Якщо прийшов один об'єкт, перетворюємо його на список
        const sensors = Array.isArray(data) ? data : [data];
        
        const grid = document.getElementById('sensor-grid');
        const statusTag = document.getElementById('status-tag');
        
        grid.innerHTML = '';
        statusTag.textContent = `Датчиків у мережі: ${sensors.length}`;

        sensors.forEach(s => {
          // Перевірка на коректність даних
          if(!s.location) return;

          const card = document.createElement('div');
          card.className = 'card-hover bg-zinc-900/50 p-6 rounded-2xl flex flex-col justify-between min-h-[200px]';
          
          card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">${s.location}</span>
              <i class="fas fa-microchip text-zinc-700"></i>
            </div>
            
            <div class="my-4 text-center">
              <div class="text-5xl font-bold gold-text">${s.moisture}%</div>
              <div class="text-[10px] text-zinc-600 uppercase mt-2 tracking-widest">Humidity</div>
            </div>

            <div class="space-y-3 mt-4">
              <div class="w-full bg-zinc-800 rounded-full h-1">
                <div class="gold-bg h-1 rounded-full shadow-[0_0_10px_#D4AF37]" style="width: ${s.moisture}%"></div>
              </div>
              <div class="flex justify-between text-[9px] text-zinc-500 uppercase font-bold">
                <span><i class="fas fa-battery-half mr-1"></i> ${s.battery || '--'}%</span>
                <span>${new Date(s.updated || Date.now()).toLocaleTimeString()}</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

      } catch (e) {
        console.error("Помилка даних:", e);
      }
    }

    // Оновлення
    updateSensors();
    setInterval(updateSensors, 30000);
  </script>
</body>
</html>
