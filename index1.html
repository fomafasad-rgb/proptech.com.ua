<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Data Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; /* Глибокий синій/сірий */
            color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.15);
            transform: translateY(-2px);
        }

        .progress-track {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 999px;
            overflow: hidden;
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Кастомний скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-sky-500 selection:text-white">

    <nav class="border-b border-white/5 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center shadow-lg shadow-sky-500/20">
                    <i class="fa-solid fa-network-wired text-white text-sm"></i>
                </div>
                <span class="font-bold text-lg tracking-tight">System<span class="text-sky-400">Hub</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                    <div id="conn-indicator" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span id="conn-status" class="text-xs font-semibold text-emerald-400 tracking-wide uppercase">Connected</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-8">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel rounded-2xl p-5">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Total Nodes</p>
                <p class="text-3xl font-bold mono text-white" id="stat-total">0</p>
            </div>
            <div class="glass-panel rounded-2xl p-5">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Warnings</p>
                <p class="text-3xl font-bold mono text-rose-400" id="stat-warnings">0</p>
            </div>
            <div class="glass-panel rounded-2xl p-5">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Avg Moisture</p>
                <p class="text-3xl font-bold mono text-sky-400" id="stat-avg">0%</p>
            </div>
            <div class="glass-panel rounded-2xl p-5 flex flex-col justify-center">
                <button onclick="fetchSensors()" class="w-full py-3 rounded-xl bg-sky-500/10 text-sky-400 border border-sky-500/20 hover:bg-sky-500 hover:text-white transition-all font-semibold text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate"></i> Force Sync
                </button>
            </div>
        </div>

        <div id="sensor-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-sky-500"></i>
                <p class="text-sm font-medium tracking-wide">Fetching telemetry data...</p>
            </div>
        </div>

    </main>

    <script>
        const AUTH_TOKEN = 'Kyiv-2026';
        const API_URL = 'https://monitor.proptech.com.ua/?token=monitor-2026');

        async function fetchSensors() {
            const grid = document.getElementById('sensor-grid');
            const indicator = document.getElementById('conn-indicator');
            const statusText = document.getElementById('conn-status');

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': AUTH_TOKEN,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const sensors = Array.isArray(data) ? data : [data];
                
                // Рахуємо статистику
                let warnings = 0;
                let sumMoisture = 0;

                grid.innerHTML = '';

                sensors.forEach(s => {
                    if(!s.location) return;

                    const val = parseFloat(s.moisture) || 0;
                    const isAlert = val > 60;
                    
                    if (isAlert) warnings++;
                    sumMoisture += val;

                    // Вибір кольору в залежності від стану
                    const colorClass = isAlert ? 'bg-gradient-to-r from-rose-500 to-red-500' : 'bg-gradient-to-r from-sky-400 to-blue-500';
                    const textClass = isAlert ? 'text-rose-400' : 'text-sky-400';
                    const borderClass = isAlert ? 'border-rose-500/30' : 'border-white/5';

                    grid.innerHTML += `
                        <div class="glass-panel rounded-2xl p-5 relative overflow-hidden flex flex-col justify-between min-h-[180px] ${borderClass}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-2">
                                    <i class="fa-solid fa-microchip text-slate-500 text-xs"></i>
                                    <span class="mono text-xs font-bold text-slate-300 tracking-wider">NODE-${s.location}</span>
                                </div>
                                <div class="w-1.5 h-1.5 rounded-full ${isAlert ? 'bg-rose-500 animate-pulse' : 'bg-emerald-400'}"></div>
                            </div>

                            <div class="my-2">
                                <div class="flex items-baseline gap-1">
                                    <span class="mono text-4xl font-bold text-white">${val}</span>
                                    <span class="mono text-lg ${textClass}">%</span>
                                </div>
                                <p class="text-[10px] uppercase tracking-widest text-slate-500 mt-1 font-semibold">Moisture</p>
                            </div>

                            <div class="mt-4">
                                <div class="progress-track mb-2">
                                    <div class="progress-fill ${colorClass}" style="width: ${Math.min(val, 100)}%"></div>
                                </div>
                                <div class="flex justify-between items-center text-[10px] mono text-slate-400">
                                    <span><i class="fa-solid fa-bolt mr-1"></i>${s.battery || '--'}%</span>
                                    <span>${new Date(s.updated || Date.now()).toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                // Оновлення статистики на панелі
                document.getElementById('stat-total').textContent = sensors.length;
                document.getElementById('stat-warnings').textContent = warnings;
                document.getElementById('stat-avg').textContent = sensors.length ? Math.round(sumMoisture / sensors.length) + '%' : '0%';

                // Статус з'єднання
                indicator.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                statusText.className = "text-xs font-semibold text-emerald-400 tracking-wide uppercase";
                statusText.textContent = "Connected";

            } catch (error) {
                console.error("Fetch error:", error);
                
                indicator.className = "w-2 h-2 rounded-full bg-rose-500";
                statusText.className = "text-xs font-semibold text-rose-500 tracking-wide uppercase";
                statusText.textContent = "Offline";

                grid.innerHTML = `
                    <div class="col-span-full py-12 px-6 glass-panel rounded-2xl border-rose-500/20 text-center">
                        <i class="fa-solid fa-triangle-exclamation text-4xl text-rose-500 mb-4"></i>
                        <h3 class="text-lg font-bold text-white mb-2">Connection Error</h3>
                        <p class="text-slate-400 text-sm mb-4">Cannot connect to the server or authorization failed.</p>
                        <code class="bg-slate-900 px-3 py-2 rounded text-rose-400 text-xs mono border border-rose-500/10 block max-w-md mx-auto">
                            ${error.message}
                        </code>
                    </div>
                `;
            }
        }

        // Запуск
        fetchSensors();
        setInterval(fetchSensors, 15000); // Оновлення кожні 15 секунд
    </script>
</body>
</html>
