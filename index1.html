<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlanka | Monitoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FFD700; --bg: #050505; --grid: rgba(255, 215, 0, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); margin-bottom: 30px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: rgba(255, 215, 0, 0.02); border: 1px solid var(--grid); padding: 25px; border-radius: 5px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        .location { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; margin-bottom: 15px; }
        .val { font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        .status-ok { color: #4ade80; }
        .status-warn { color: #f87171; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .time { font-size: 0.7rem; color: #555; margin-top: 15px; border-top: 1px solid #111; padding-top: 10px; }
        .btn-update { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; cursor: pointer; font-family: 'Orbitron', sans-serif; margin-top: 40px; transition: 0.3s; }
        .btn-update:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>
    <h1>[ SYSTEM MONITORING ]</h1>
    <div class="grid" id="sensorGrid"></div>
    <button class="btn-update" onclick="fetchData()">REFRESH SYSTEM</button>

    <script>
        const apiUrl = "https://monitor.proptech.com.ua";

        async function fetchData() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const grid = document.getElementById('sensorGrid');
                
                if (data.msg === "No data") {
                    grid.innerHTML = "<div style='color: #444'>[ ОЧІКУВАННЯ ДАНИХ ВІД ОБ'ЄКТІВ... ]</div>";
                    return;
                }
                
                grid.innerHTML = '';
                const sensors = Array.isArray(data) ? data : [data];
                
                sensors.forEach(s => {
                    const isCritical = (s.moisture > 40);
                    grid.innerHTML += `
                        <div class="card">
                            <div class="location">${s.location || 'SENSOR-X'}</div>
                            <div class="val">ВОЛОГІСТЬ: ${s.moisture}%</div>
                            <div class="val">ЗАРЯД: ${s.battery}%</div>
                            <div class="${isCritical ? 'status-warn' : 'status-ok'}">
                                СТАТУС: ${isCritical ? 'КРИТИЧНО' : 'ОК'}
                            </div>
                            <div class="time">ОНОВЛЕНО: ${s.updated ? new Date(s.updated).toLocaleString('uk-UA') : 'N/A'}</div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        fetchData();
        // Оновлення раз на 1 годину (3600000 мілісекунд)
        setInterval(fetchData, 3600000);
    </script>
</body>
</html>
