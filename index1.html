<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBUD | Multi-Sensor Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #FFD700; --bg: #0a0a0a; --card-bg: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-left: 4px solid var(--primary); padding: 15px; border-radius: 4px; }
        .sensor-id { font-weight: bold; color: var(--primary); margin-bottom: 10px; font-size: 0.9rem; }
        .val-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        canvas { margin-top: 15px; max-height: 100px; }
        .status { font-size: 0.7rem; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: var(--primary);">[ LIVE MONITORING SYSTEM ]</h2>
    <div class="grid" id="container"></div>

    <script>
        const apiUrl = "https://monitor.proptech.com.ua";
        const charts = {};

        async function updateData() {
            try {
                const res = await fetch(apiUrl);
                const sensors = await res.json();
                const container = document.getElementById('container');

                sensors.forEach(s => {
                    let card = document.getElementById(`card-${s.location}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `card-${s.location}`;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="sensor-id">${s.location}</div>
                            <div class="val-row"><span>Волога:</span><span id="m-${s.location}">0%</span></div>
                            <div class="val-row"><span>Заряд:</span><span id="b-${s.location}">0%</span></div>
                            <canvas id="chart-${s.location}"></canvas>
                            <div class="status">Оновлено: <span id="t-${s.location}">-</span></div>
                        `;
                        container.appendChild(card);
                        initChart(s.location);
                    }
                    
                    document.getElementById(`m-${s.location}`).innerText = s.moisture + '%';
                    document.getElementById(`b-${s.location}`).innerText = s.battery + '%';
                    document.getElementById(`t-${s.location}`).innerText = new Date(s.updated).toLocaleTimeString();
                    
                    updateChart(s.location, s.moisture);
                });
            } catch (e) { console.error("Помилка:", e); }
        }

        function initChart(id) {
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: { labels: ['', '', '', '', ''], datasets: [{ data: [0,0,0,0,0], borderColor: '#FFD700', tension: 0.4, borderWidth: 2, pointRadius: 0 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } } }
            });
        }

        function updateChart(id, val) {
            const chart = charts[id];
            chart.data.datasets[0].data.push(val);
            chart.data.datasets[0].data.shift();
            chart.update();
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
