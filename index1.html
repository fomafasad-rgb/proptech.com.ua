<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBUD.Digital | Space Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --neon-gold: #FFD700;
            --space-dark: #030712;
            --glass-bg: rgba(15, 23, 42, 0.4);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--space-dark);
            /* Космічний фон з сіткою */
            background-image: 
                radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: white;
            overflow-x: hidden;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .cosmic-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cosmic-card:hover {
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.1), 0 0 40px rgba(255, 215, 0, 0.2);
            transform: translateY(-5px) scale(1.02);
        }

        /* Анімація лазерного сканера всередині картки */
        @keyframes scanline {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        
        .scanner-beam {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-gold);
            box-shadow: 0 0 15px 3px var(--neon-gold);
            animation: scanline 4s linear infinite;
            z-index: 10;
        }

        /* Круговий радар для вологості */
        .radar-circle {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes spin-slow {
            100% { transform: rotate(360deg); }
        }

        .radar-spin {
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            border-top: 2px solid var(--neon-gold);
            border-right: 2px solid transparent;
            animation: spin-slow 3s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-indigo-900/50 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="relative flex items-center justify-center w-10 h-10">
                    <i class="fas fa-globe text-yellow-500 text-xl absolute z-10"></i>
                    <div class="absolute inset-0 border border-yellow-500/50 rounded-full animate-[spin-slow_4s_linear_infinite]"></div>
                </div>
                <div class="flex flex-col">
                    <span class="orbitron text-2xl font-900 tracking-widest text-white">GBUD<span class="text-yellow-500">.Digital</span></span>
                    <span class="text-[10px] uppercase tracking-[0.4em] text-indigo-400 font-bold">Orbital Monitoring System</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-indigo-950/30 px-4 py-2 rounded-full border border-indigo-500/20">
                <div class="relative">
                    <div id="status-led" class="w-2.5 h-2.5 bg-green-500 rounded-full"></div>
                    <div class="absolute inset-0 bg-green-500 rounded-full animate-ping opacity-75"></div>
                </div>
                <span id="active-count" class="text-xs font-bold orbitron uppercase tracking-widest text-indigo-200">Uplink Established</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-10">
        
        <div class="mb-10 p-6 rounded-2xl bg-gradient-to-r from-indigo-900/20 to-black/20 border border-indigo-500/10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl font-bold orbitron text-white mb-1 tracking-widest flex items-center gap-3">
                    <i class="fas fa-layer-group text-yellow-500 text-xl"></i>
                    TELEMETRY HUB
                </h1>
                <p class="text-indigo-300 text-sm font-semibold tracking-wide">Сенсорна решітка об'єкта. Дані оновлюються в режимі реального часу.</p>
            </div>
            
            <button onclick="fetchData()" class="px-6 py-3 bg-indigo-950/50 border border-yellow-500/30 text-yellow-500 rounded-xl hover:bg-yellow-500 hover:text-black hover:shadow-[0_0_20px_rgba(255,215,0,0.5)] transition-all duration-300 orbitron text-xs font-bold tracking-widest group">
                <i class="fas fa-satellite-dish mr-2 group-hover:animate-pulse"></i> FORCE SYNC
            </button>
        </div>

        <div id="sensor-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <div class="col-span-full py-32 flex flex-col items-center justify-center">
                <div class="relative w-24 h-24 mb-6">
                    <div class="absolute inset-0 border-4 border-t-yellow-500 border-indigo-900 rounded-full animate-spin"></div>
                    <i class="fas fa-crosshairs absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl text-yellow-500"></i>
                </div>
                <p class="orbitron text-indigo-400 tracking-[0.5em] text-sm font-bold animate-pulse">SCANNING SECTORS...</p>
            </div>
        </div>

    </main>

    <script>
        async function fetchData() {
            const grid = document.getElementById('sensor-grid');
            const countLabel = document.getElementById('active-count');
            const led = document.getElementById('status-led');

            try {
                // БЕЗПЕЧНИЙ ЗАПИТ ІЗ ПУБЛІЧНИМ ТОКЕНОМ
                const response = await fetch('https://monitor.proptech.com.ua/?token=monitor-2026');

                if (!response.ok) throw new Error('Signal Lost');

                const raw = await response.json();
                const sensors = Array.isArray(raw) ? raw : [raw];
                
                grid.innerHTML = '';
                countLabel.textContent = `Nodes Online: ${sensors.length}`;
                led.className = "w-2.5 h-2.5 bg-green-500 rounded-full";

                sensors.forEach((s, index) => {
                    if(!s.location) return;

                    // ЛОГІКА ТРЬОХ КОЛЬОРІВ ЗАМІСТЬ ОДНОГО
                    let colorLed = '';
                    let colorRadar = '';
                    let colorText = '';
                    let pulse = '';

                    if (s.moisture < 40) {
                        // 🟢 ЗЕЛЕНИЙ
                        colorLed = 'bg-emerald-500 shadow-[0_0_10px_#10b981]';
                        colorRadar = 'border-t-emerald-500';
                        colorText = 'text-emerald-400 text-glow';
                    } else if (s.moisture >= 40 && s.moisture <= 60) {
                        // 🟠 ПОМАРАНЧЕВИЙ
                        colorLed = 'bg-orange-500 shadow-[0_0_10px_#f97316]';
                        colorRadar = 'border-t-orange-500';
                        colorText = 'text-orange-400 text-glow';
                    } else {
                        // 🔴 ЧЕРВОНИЙ
                        colorLed = 'bg-red-500 shadow-[0_0_10px_red]';
                        colorRadar = 'border-t-red-500';
                        colorText = 'text-red-500 text-glow';
                        pulse = 'animate-pulse';
                    }
                    
                    const delay = index * 100;

                    const card = document.createElement('div');
                    card.className = 'cosmic-card p-6 rounded-[20px] flex flex-col items-center justify-between min-h-[260px] opacity-0 animate-[fadeIn_0.5s_forwards]';
                    card.style.animationDelay = `${delay}ms`;
                    
                    card.innerHTML = `
                        <div class="scanner-beam" style="animation-delay: ${delay}ms"></div>

                        <div class="w-full flex justify-between items-start mb-4 z-20">
                            <div class="bg-indigo-950/50 border border-indigo-500/30 px-3 py-1 rounded-md">
                                <span class="orbitron text-[11px] font-bold text-indigo-300 tracking-[0.2em]">SEC-${s.location}</span>
                            </div>
                            <div class="w-2 h-2 rounded-full ${colorLed} ${pulse} mt-1.5"></div>
                        </div>

                        <div class="radar-circle my-2 z-20">
                            <div class="radar-spin ${colorRadar}"></div>
                            <div class="flex flex-col items-center justify-center">
                                <span class="text-4xl orbitron font-900 ${colorText}">${s.moisture}</span>
                                <span class="text-[10px] text-indigo-400 font-bold">%</span>
                            </div>
                        </div>

                        <div class="text-[9px] uppercase tracking-[0.4em] text-indigo-300 mt-2 font-bold z-20 mb-4">H2O Level</div>

                        <div class="w-full pt-4 border-t border-indigo-500/20 flex justify-between text-[10px] orbitron font-bold text-indigo-400 tracking-widest z-20">
                            <span class="flex items-center gap-1"><i class="fas fa-battery-half text-indigo-400"></i> ${s.battery || 95}%</span>
                            <span>${new Date(s.updated || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error("Transmission error:", err);
                led.className = "w-2.5 h-2.5 bg-red-600 rounded-full shadow-[0_0_10px_red]";
                countLabel.textContent = "UPLINK FAILED";
                grid.innerHTML = `
                    <div class="col-span-full py-32 flex flex-col items-center">
                        <i class="fas fa-triangle-exclamation text-5xl text-red-500 mb-4 animate-pulse"></i>
                        <p class="orbitron text-red-500 text-lg tracking-widest mb-2 font-bold text-glow">СИГНАЛ ВТРАЧЕНО</p>
                        <p class="text-indigo-400 text-xs uppercase font-mono tracking-widest">Перевірте конфігурацію Cloudflare Worker</p>
                    </div>`;
            }
        }

        // Анімація появи
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        setInterval(fetchData, 115000); // Оновлення кожні 15 секунд для більшої динаміки
        fetchData();
    </script>
</body>
</html>
